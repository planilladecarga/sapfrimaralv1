name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master", "work"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set app version
        run: echo "VITE_APP_VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build
        run: VITE_APP_VERSION=${GITHUB_SHA::7} npm run build

      - name: Write build metadata artifact
        run: |
          cat > dist/build-meta.json <<EOF
          {"sha":"${GITHUB_SHA}","shortSha":"${GITHUB_SHA::7}","buildTime":"${VITE_BUILD_TIME}"}
          EOF
          test -f dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
